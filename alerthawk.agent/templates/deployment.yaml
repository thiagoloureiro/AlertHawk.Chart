apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}-monitoring
  labels:
    app: {{ include "name" . }}
    component: monitoring
spec:
  replicas: {{ .Values.monitoring.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ include "name" . }}
      component: monitoring
  template:
    metadata:
      labels:
        app: {{ include "name" . }}
        component: monitoring
    spec:
      containers:
        - name: monitoring
          image: {{ .Values.image.monitoring }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- with .Values.monitoring.env }}
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
