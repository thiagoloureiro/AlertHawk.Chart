apiVersion: v1
kind: Service
metadata:
  name: {{ include "name" . }}-monitoring
  labels:
    app: {{ include "name" . }}
    component: monitoring
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    app: {{ include "name" . }}
    component: monitoring
